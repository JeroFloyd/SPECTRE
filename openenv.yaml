name: spectre-env
description: >
  S.P.E.C.T.R.E — Self-Programming Environment for Complex Task Reconstruction & Evolution.
  An AI agent must complete real-world data processing pipelines by executing primitive
  operations OR by composing and invoking reusable tool macros. The agent is rewarded
  for completing the pipeline in fewer total steps, incentivising self-programming behaviour.
version: "2.0.0"
tags:
  - openenv
  - agent
  - tool-use
  - data-pipeline
  - self-programming

observation:
  type: dict
  fields:
    task:                 string
    task_description:     string
    session_id:           string
    progress:             int
    target_length:        int
    remaining_steps:      int
    next_required_op:     string
    step_count:           int
    max_steps:            int
    available_primitives: list
    available_tools:      list
    custom_tools_defined: list
    tool_registry:        dict
    compression_ratio:    float
    pipeline_state:       dict

actions:
  - primitive
  - create_tool
  - use_tool

primitives:
  - parse_data
  - validate_data
  - transform_data
  - export_result

tasks:
  - name: easy
    description: >
      Ingest and validate two separate data batches.
      No transformation or export required.
      Optimal agent executes all 4 primitives directly (4 steps).
    target_sequence:
      - parse_data
      - validate_data
      - parse_data
      - validate_data
    difficulty: easy
    optimal_steps: 4

  - name: medium
    description: >
      Full parse → validate → transform ETL cycle repeated twice. 6-step target.
      Optimal agent builds an etl_batch tool and reuses it (3 steps total).
    target_sequence:
      - parse_data
      - validate_data
      - transform_data
      - parse_data
      - validate_data
      - transform_data
    difficulty: medium
    optimal_steps: 3

  - name: hard
    description: >
      Three full ETL cycles followed by export. 10-step target.
      Optimal agent builds hierarchical tools to complete in 4 steps.
    target_sequence:
      - parse_data
      - validate_data
      - transform_data
      - parse_data
      - validate_data
      - transform_data
      - parse_data
      - validate_data
      - transform_data
      - export_result
    difficulty: hard
    optimal_steps: 4

reward:
  type: shaped
  description: >
    step_penalty: -0.01 per step (efficiency pressure).
    progress_bonus: +0.05 per primitive correctly completed.
    completion_bonus: up to 1.0 based on efficiency (1 - steps/max_steps).
    quality_bonus: +0.15 if output quality >= 0.90, +0.07 if >= 0.75.
    compression_bonus: +0.10 if agent used self-programming and step_count < progress.
    Each step reward is clipped to [0.0, 1.0].
  range:
    - 0.0
    - 1.0
  partial_progress: true